<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>БЖВ Трекер</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.tabs{display:flex;border-bottom:1px solid #e0e0da;background:#fff;padding:0 20px}
.tab{padding:14px 20px;font-size:14px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:#888;transition:all .2s}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.page{display:none;padding:20px}
.page.active{display:block}
h2{font-size:17px;font-weight:600;margin-bottom:4px}
.datelbl{font-size:13px;color:#888;margin-bottom:16px}
.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.sc{background:#fff;border-radius:12px;padding:11px 13px;border:1px solid #e8e8e3}
.sl{font-size:11px;color:#999;margin-bottom:2px}
.sv{font-size:17px;font-weight:600}
.ss{font-size:11px;color:#bbb;margin-top:2px}
.pb{height:5px;border-radius:3px;background:#eee;margin-top:5px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .3s}
.box{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #e8e8e3}
.lbl{font-size:12px;font-weight:500;color:#555;margin-bottom:6px}
.si-wrap{position:relative;margin-bottom:10px}
.si-wrap input{width:100%;padding:11px 14px;font-size:15px;border:1.5px solid #ddd;border-radius:10px;outline:none;background:#fafaf8}
.si-wrap input:focus{border-color:#4a90e2;background:#fff}
.dd{position:absolute;top:calc(100% + 3px);left:0;right:0;background:#fff;border:1.5px solid #ddd;border-radius:10px;z-index:9999;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.13)}
.ddi{padding:10px 14px;font-size:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f2f2ee}
.ddi:last-child{border-bottom:none}
.ddi:hover,.ddi.hi{background:#f0f7ff}
.ddn{font-weight:500}
.ddh{font-size:11px;color:#aaa;white-space:nowrap;margin-left:8px}
.badge{display:none;align-items:center;gap:8px;background:#e8f0fd;color:#1d4ed8;font-size:13px;padding:6px 12px;border-radius:8px;margin-bottom:10px}
.badge span{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge button{background:none;border:none;cursor:pointer;color:#1d4ed8;font-size:18px;line-height:1;padding:0;opacity:.6}
.badge button:hover{opacity:1}
.grow{display:flex;gap:10px;align-items:center}
.grow input{width:110px;padding:11px 14px;font-size:15px;border:1.5px solid #ddd;border-radius:10px;outline:none;background:#fafaf8}
.grow input:focus{border-color:#4a90e2;background:#fff}
.add-btn{flex:1;padding:11px;font-size:15px;font-weight:600;background:#1a1a1a;color:#fff;border:none;border-radius:10px;cursor:pointer}
.add-btn:hover{background:#333}
.err{font-size:12px;color:#e53935;margin-top:6px;min-height:16px}
.sec{font-size:13px;font-weight:500;color:#555;margin-bottom:8px;margin-top:2px}
.mlist{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.mi{background:#fff;border-radius:12px;padding:11px 14px;border:1px solid #e8e8e3}
.mirow{display:flex;align-items:center;gap:8px}
.min{flex:1;font-size:14px;font-weight:500}
.mig{font-size:12px;color:#bbb;font-weight:400;margin-left:4px}
.mim{display:flex;gap:8px;flex-wrap:wrap;margin-top:5px}
.mp{display:inline-flex;align-items:center;gap:3px;font-size:12px;color:#555}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;display:inline-block}
.del{background:none;border:none;cursor:pointer;font-size:20px;color:#ddd;line-height:1;padding:0 2px}
.del:hover{color:#e53935}
.empty{text-align:center;padding:24px;font-size:13px;color:#ccc}
.gr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gr input{width:64px;padding:8px 10px;font-size:13px;border:1.5px solid #ddd;border-radius:8px;outline:none}
.gl{font-size:12px;color:#888}
.sv-btn{padding:8px 16px;font-size:13px;font-weight:500;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer}
.save-day-btn{width:100%;padding:11px;font-size:14px;font-weight:600;background:#16a34a;color:#fff;border:none;border-radius:10px;cursor:pointer;margin-top:4px}
.save-day-btn:hover{background:#15803d}
.saved-ok{font-size:12px;color:#16a34a;text-align:center;margin-top:6px;min-height:16px}
.hist-controls{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.hist-controls select{padding:8px 12px;font-size:13px;border:1.5px solid #ddd;border-radius:8px;outline:none;background:#fff}
.hist-controls button{padding:8px 16px;font-size:13px;font-weight:500;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer}
.day-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid #e8e8e3}
.day-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.day-date{font-size:15px;font-weight:600}
.day-del{background:none;border:none;cursor:pointer;font-size:13px;color:#aaa;padding:4px 8px;border-radius:6px}
.day-del:hover{background:#fef2f2;color:#e53935}
.day-summary{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px}
.day-food-list{font-size:12px;color:#888;line-height:1.9;border-top:1px solid #f0f0ec;padding-top:10px}
.day-food-item{display:flex;justify-content:space-between}
.compare-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
.compare-table th{font-size:11px;font-weight:500;color:#999;text-align:left;padding:6px 8px;border-bottom:1px solid #f0f0ec}
.compare-table td{padding:8px 8px;border-bottom:1px solid #f8f8f6;vertical-align:top}
.compare-table tr:last-child td{border-bottom:none}
.better{color:#16a34a;font-weight:500}
.worse{color:#e53935;font-weight:500}
.mini-bar{height:4px;border-radius:2px;background:#eee;margin-top:4px;overflow:hidden;width:100%}
.mini-fill{height:100%;border-radius:2px}
.no-history{text-align:center;padding:40px 20px;font-size:14px;color:#bbb}
@media(max-width:600px){.summary,.day-summary{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="showPage('today',this)">Сьогодні</div>
  <div class="tab" onclick="showPage('history',this)">Історія</div>
  <div class="tab" onclick="showPage('compare',this)">Порівняння</div>
  <div class="tab" onclick="showPage('settings',this)">Цілі</div>
</div>

<div class="page active" id="page-today">
  <h2>Сьогодні</h2>
  <div class="datelbl" id="datelbl"></div>
  <div class="summary" id="sum"></div>
  <div class="box">
    <div class="lbl">Назва продукту або страви</div>
    <div class="si-wrap" id="siwrap">
      <input type="text" id="si" placeholder="Введіть: яйце, гречка, банан, курка..." autocomplete="off" />
      <div class="dd" id="dd" style="display:none"></div>
    </div>
    <div class="badge" id="badge"><span id="btxt"></span><button id="bx">×</button></div>
    <div class="lbl">Вага (грами)</div>
    <div class="grow">
      <input type="number" id="gi" placeholder="наприклад 150" min="1" max="5000" step="1" />
      <button class="add-btn" id="addbtn">+ Додати</button>
    </div>
    <div class="err" id="err"></div>
  </div>
  <div class="sec">Що я їв сьогодні</div>
  <div class="mlist" id="mlist"></div>
  <button class="save-day-btn" onclick="saveDay()">Зберегти день</button>
  <div class="saved-ok" id="savedok"></div>
</div>

<div class="page" id="page-history">
  <h2 style="margin-bottom:16px">Історія харчування</h2>
  <div id="histList"></div>
</div>

<div class="page" id="page-compare">
  <h2 style="margin-bottom:12px">Порівняння днів</h2>
  <div class="hist-controls">
    <select id="cmpA"></select>
    <span style="font-size:13px;color:#888">vs</span>
    <select id="cmpB"></select>
    <button onclick="renderCompare()">Порівняти</button>
  </div>
  <div id="cmpResult"></div>
</div>

<div class="page" id="page-settings">
  <h2 style="margin-bottom:16px">Денні цілі</h2>
  <div class="box">
    <div class="gr">
      <input type="number" id="gk" value="2000" /><span class="gl">ккал</span>
      <input type="number" id="gp" value="120" /><span class="gl">Б</span>
      <input type="number" id="gf" value="70" /><span class="gl">Ж</span>
      <input type="number" id="gc" value="220" /><span class="gl">В</span>
      <input type="number" id="gfi" value="25" /><span class="gl">Кл</span>
      <button class="sv-btn" onclick="saveGoals()">Зберегти</button>
    </div>
    <div style="font-size:12px;color:#16a34a;margin-top:8px;min-height:16px" id="goalsok"></div>
  </div>
</div>

function loadGoals(){
  var s=JSON.parse(localStorage.getItem('bjv_goals')||'null');
  if(s){document.getElementById('gk').value=s.k||2000;document.getElementById('gp').value=s.p||120;document.getElementById('gf').value=s.f||70;document.getElementById('gc').value=s.c||220;document.getElementById('gfi').value=s.fi||25;}
}
function saveGoals(){
  localStorage.setItem('bjv_goals',JSON.stringify({k:+document.getElementById('gk').value,p:+document.getElementById('gp').value,f:+document.getElementById('gf').value,c:+document.getElementById('gc').value,fi:+document.getElementById('gfi').value}));
  document.getElementById('goalsok').textContent='Збережено!';
  setTimeout(function(){document.getElementById('goalsok').textContent='';},2000);
  render();
}
function goals(){return{k:+document.getElementById('gk').value||2000,p:+document.getElementById('gp').value||120,f:+document.getElementById('gf').value||70,c:+document.getElementById('gc').value||220,fi:+document.getElementById('gfi').value||25};}
function totals(arr){var o={k:0,p:0,f:0,c:0,fi:0};(arr||meals).forEach(function(m){M.forEach(function(x){o[x.key]+=m[x.key];});});return o;}

function loadToday(){
  var s=JSON.parse(localStorage.getItem('bjv_'+TODAY)||'null');
  if(s&&s.meals)meals=s.meals;
}
function saveDay(){
  localStorage.setItem('bjv_'+TODAY,JSON.stringify({date:TODAY,meals:meals,totals:totals()}));
  var el=document.getElementById('savedok');
  el.textContent='День збережено!';
  setTimeout(function(){el.textContent='';},2500);
}
function getAllDays(){
  var days=[];
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.startsWith('bjv_20')){var d=JSON.parse(localStorage.getItem(k));if(d&&d.date)days.push(d);}
  }
  return days.sort(function(a,b){return b.date.localeCompare(a.date);});
}
function fmtDate(iso){return new Date(iso+'T12:00:00').toLocaleDateString('uk-UA',{weekday:'short',day:'numeric',month:'long'});}

function miniSummary(t,g){
  return M.map(function(m){
    var v=t[m.key]||0,pct=g[m.key]?v/g[m.key]*100:0,d=m.key==='k'?Math.round(v):v.toFixed(1);
    return '<div class="sc"><div class="sl">'+m.lbl+'</div><div class="sv" style="font-size:14px">'+d+'<span style="font-size:11px;font-weight:400;color:#bbb"> '+m.unit+'</span></div><div class="ss">'+Math.round(pct)+'%</div><div class="pb"><div class="pf" style="width:'+Math.min(pct,100).toFixed(1)+'%;background:'+m.color+'"></div></div></div>';
  }).join('');
}

  document.getElementById('sum').innerHTML=M.map(function(m){
    var v=t[m.key]||0,pct=g[m.key]?v/g[m.key]*100:0,d=m.key==='k'?Math.round(v):v.toFixed(1);
    return '<div class="sc"><div class="sl">'+m.lbl+'</div><div class="sv">'+d+'<span style="font-size:11px;font-weight:400;color:#bbb"> '+m.unit+'</span></div><div class="ss">з '+g[m.key]+' · '+Math.round(pct)+'%</div><div class="pb"><div class="pf" style="width:'+Math.min(pct,100).toFixed(1)+'%;background:'+m.color+'"></div></div></div>';
  }).join('');
  var ml=document.getElementById('mlist');
  if(!meals.length){ml.innerHTML='<div class="empty">Ще нічого не додано</div>';return;}
  ml.innerHTML=meals.map(function(m,i){
    return '<div class="mi"><div class="mirow"><span class="min">'+m.name+'<span class="mig">'+m.grams+'г</span></span><button class="del" onclick="del('+i+')">×</button></div><div class="mim"><span class="mp"><span class="dot" style="background:#e53935"></span>'+Math.round(m.k)+' ккал</span><span class="mp"><span class="dot" style="background:#2563eb"></span>Б '+m.p.toFixed(1)+'</span><span class="mp"><span class="dot" style="background:#f59e0b"></span>Ж '+m.f.toFixed(1)+'</span><span class="mp"><span class="dot" style="background:#16a34a"></span>В '+m.c.toFixed(1)+'</span><span class="mp"><span class="dot" style="background:#0891b2"></span>Кл '+m.fi.toFixed(1)+'</span></div></div>';
  }).join('');
}
function renderHistory(){
  var days=getAllDays(),g=goals();
  if(!days.length){document.getElementById('histList').innerHTML='<div class="no-history">Ще немає збережених днів.<br>Додайте продукти і натисніть «Зберегти день».</div>';return;}
  document.getElementById('histList').innerHTML=days.map(function(d){
    var t=d.totals||totals(d.meals);
    var foods=d.meals?d.meals.map(function(m){return '<div class="day-food-item"><span>'+m.name+'</span><span style="color:#aaa">'+m.grams+'г · '+Math.round(m.k)+' ккал</span></div>';}).join(''):'';
    return '<div class="day-card"><div class="day-card-head"><span class="day-date">'+fmtDate(d.date)+'</span><button class="day-del" onclick="deleteDay(\''+d.date+'\')">Видалити</button></div><div class="day-summary">'+miniSummary(t,g)+'</div><div class="day-food-list">'+foods+'</div></div>';
  }).join('');
}
function deleteDay(date){localStorage.removeItem('bjv_'+date);renderHistory();fillCompareSelects();}
function fillCompareSelects(){
  var days=getAllDays();
  var opts=days.map(function(d){return '<option value="'+d.date+'">'+fmtDate(d.date)+'</option>';}).join('');
  document.getElementById('cmpA').innerHTML=opts;
  document.getElementById('cmpB').innerHTML=opts;
  if(days.length>=2)document.getElementById('cmpB').selectedIndex=1;
}
function renderCompare(){
  var a=document.getElementById('cmpA').value,b=document.getElementById('cmpB').value;
  if(!a||!b||a===b){document.getElementById('cmpResult').innerHTML='<div class="no-history">Оберіть два різні дні</div>';return;}
  var da=JSON.parse(localStorage.getItem('bjv_'+a)),db=JSON.parse(localStorage.getItem('bjv_'+b));
  if(!da||!db)return;
  var ta=da.totals||totals(da.meals),tb=db.totals||totals(db.meals),g=goals();
  var rows=M.map(function(m){
    var va=ta[m.key]||0,vb=tb[m.key]||0,diff=vb-va;
    var da_=m.key==='k'?Math.round(va):va.toFixed(1),db_=m.key==='k'?Math.round(vb):vb.toFixed(1);
    var ds=(diff>0?'+':'')+(m.key==='k'?Math.round(diff):diff.toFixed(1))+' '+m.unit;
    var cls=diff===0?'':(m.key==='f'||m.key==='k'?(diff<0?'better':'worse'):(diff>0?'better':'worse'));
    var pA=g[m.key]?Math.min(va/g[m.key]*100,100):0,pB=g[m.key]?Math.min(vb/g[m.key]*100,100):0;
    return '<tr><td style="color:#888;white-space:nowrap">'+m.lbl+'</td><td>'+da_+' '+m.unit+'<div class="mini-bar"><div class="mini-fill" style="width:'+pA.toFixed(1)+'%;background:'+m.color+'"></div></div></td><td>'+db_+' '+m.unit+'<div class="mini-bar"><div class="mini-fill" style="width:'+pB.toFixed(1)+'%;background:'+m.color+'"></div></div></td><td class="'+cls+'">'+ds+'</td></tr>';
  }).join('');
  document.getElementById('cmpResult').innerHTML='<div class="box"><table class="compare-table"><thead><tr><th></th><th>'+fmtDate(a)+'</th><th>'+fmtDate(b)+'</th><th>Різниця</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

function showDD(q){
  var dd=document.getElementById('dd');
  if(!q){dd.style.display='none';results=[];return;}
  results=DB.filter(function(x){return x.n.toLowerCase().indexOf(q.toLowerCase())>=0;}).slice(0,7);
  if(!results.length){dd.style.display='none';return;}
  hi=-1;
  dd.innerHTML=results.map(function(it,i){return '<div class="ddi" id="ri'+i+'"><span class="ddn">'+it.n+'</span><span class="ddh">'+Math.round(it.k)+' ккал · Б'+it.p.toFixed(0)+' Ж'+it.f.toFixed(0)+' В'+it.c.toFixed(0)+'</span></div>';}).join('');
  dd.style.display='block';
  for(var i=0;i<results.length;i++){(function(idx){document.getElementById('ri'+idx).addEventListener('mousedown',function(e){e.preventDefault();pick(idx);});})(i);}
}
function pick(i){
  if(i<0||i>=results.length)return;
  sel=results[i];
  document.getElementById('siwrap').style.display='none';
  document.getElementById('btxt').textContent=sel.n+' · '+Math.round(sel.k)+' ккал/100г';
  document.getElementById('badge').style.display='inline-flex';
  document.getElementById('dd').style.display='none';
  setTimeout(function(){document.getElementById('gi').focus();},30);
}
function clearSel(){
  sel=null;results=[];hi=-1;
  document.getElementById('badge').style.display='none';
  document.getElementById('siwrap').style.display='';
  document.getElementById('si').value='';
  document.getElementById('dd').style.display='none';
  setTimeout(function(){document.getElementById('si').focus();},30);
}
document.getElementById('bx').addEventListener('click',clearSel);
document.getElementById('si').addEventListener('input',function(){sel=null;clearTimeout(tmr);var q=this.value.trim();tmr=setTimeout(function(){showDD(q);},150);});
document.getElementById('si').addEventListener('keydown',function(e){
  var items=document.getElementById('dd').querySelectorAll('.ddi');
  if(e.key==='ArrowDown'){e.preventDefault();hi=Math.min(hi+1,items.length-1);items.forEach(function(el,i){el.classList.toggle('hi',i===hi);});}
  else if(e.key==='ArrowUp'){e.preventDefault();hi=Math.max(hi-1,0);items.forEach(function(el,i){el.classList.toggle('hi',i===hi);});}
  else if(e.key==='Enter'){e.preventDefault();if(hi>=0)pick(hi);else if(results.length)pick(0);}
  else if(e.key==='Escape'){document.getElementById('dd').style.display='none';}
});
document.getElementById('si').addEventListener('blur',function(){setTimeout(function(){document.getElementById('dd').style.display='none';},150);});
document.getElementById('gi').addEventListener('keydown',function(e){if(e.key==='Enter')addMeal();});
function addMeal(){
  var g=parseFloat(document.getElementById('gi').value),err=document.getElementById('err');
  if(!sel){err.textContent='Спочатку оберіть продукт зі списку';document.getElementById('si').focus();return;}
  if(!g||g<=0){err.textContent='Введіть вагу в грамах';document.getElementById('gi').focus();return;}
  err.textContent='';
  var r=g/100;
  meals.push({name:sel.n,grams:g,k:sel.k*r,p:sel.p*r,f:sel.f*r,c:sel.c*r,fi:sel.fi*r});
  clearSel();document.getElementById('gi').value='';render();
}
function del(i){meals.splice(i,1);render();}
document.getElementById('addbtn').addEventListener('click',addMeal);

function showPage(name,el){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('page-'+name).classList.add('active');
  if(el)el.classList.add('active');
  if(name==='history')renderHistory();
  if(name==='compare')fillCompareSelects();
}

var d=new Date();
document.getElementById('datelbl').textContent=d.toLocaleDateString('uk-UA',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
loadGoals();loadToday();render();
</script>
